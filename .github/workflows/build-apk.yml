name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use stable Node 20 to completely bypass the parser crash

      - name: Install npm dependencies
        run: npm install

      # We manually create the dummy folders so Capacitor v7 sync doesn't complain,
      # and force standard execution on Node 20.
      - name: Force Sync Capacitor
        run: |
          mkdir -p www dist build
          npx cap sync android --no-telemetry

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: calisma-takibi-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
