name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Sticking with Node 20 to avoid the TS parser bug

      - name: Install npm dependencies
        run: npm install

      # We explicitly install the CLI so npx recognizes it,
      # create the dummy folders, and run the sync.
      - name: Force Sync Capacitor
        run: |
          npm install @capacitor/cli
          mkdir -p www dist build
          npx cap sync android --no-telemetry

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: calisma-takibi-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
