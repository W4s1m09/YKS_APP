name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Force Sync Capacitor
        run: |
          # Install CLI explicitly to ensure npx finds it
          npm install -D @capacitor/cli
          mkdir -p www dist build
          
          # Convert .ts config to .json to bypass the Node 22 parsing bug
          if [ -f capacitor.config.ts ]; then
            npx --yes typescript@5 tsc capacitor.config.ts --module CommonJS --esModuleInterop --outDir .temp
            # Simple conversion: this assumes your config is a default export
            node -e 'const config = require("./.temp/capacitor.config.js").default; require("fs").writeFileSync("capacitor.config.json", JSON.stringify(config, null, 2));'
            rm -rf .temp
          fi
          
          npx cap sync android --no-telemetry

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: calisma-takibi-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
